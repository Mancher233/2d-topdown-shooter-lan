<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>2D 俯视角射击游戏 - LAN 多人对战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==============================
       大厅界面 (Lobby)
       玩家在这里选择"创建房间"或"加入房间"
       ============================== -->
  <div id="lobby">
    <h1>2D 俯视角射击游戏</h1>
    <p class="subtitle">局域网双人对战</p>

    <div id="status-msg">请选择操作：</div>

    <!-- 创建游戏（Host）按钮 -->
    <div class="lobby-section">
      <button id="btn-host">创建游戏 (Host)</button>
      <p class="hint">在本机启动游戏，等待另一位玩家加入</p>
    </div>

    <!-- 加入游戏（Join）区域 -->
    <div class="lobby-section">
      <label for="input-ip">房主 IP 地址：</label>
      <input type="text" id="input-ip" placeholder="例如 192.168.1.100">
      <button id="btn-join">加入游戏 (Join)</button>
      <p class="hint">输入房主电脑的局域网 IP 地址来加入游戏</p>
    </div>
  </div>

  <!-- ==============================
       游戏画布 (Canvas)
       游戏开始后才显示
       ============================== -->
  <canvas id="gameCanvas" width="800" height="600" style="display:none;"></canvas>

  <!-- ==============================
       加载所有 JS 模块
       注意：顺序很重要！被依赖的模块要先加载
       ============================== -->
  <!-- 基础工具函数（被其他模块使用） -->
  <script src="js/utils.js"></script>
  <!-- 键盘和鼠标输入 -->
  <script src="js/input.js"></script>
  <!-- 资源预加载（图片 + 音频） -->
  <script src="js/assets.js"></script>
  <!-- 地图：墙壁、碰撞检测 -->
  <script src="js/map.js"></script>
  <!-- 玩家：移动、翻滚、瞄准 -->
  <script src="js/player.js"></script>
  <!-- 子弹：飞行、碰撞 -->
  <script src="js/bullet.js"></script>
  <!-- 手雷：抛掷、爆炸 -->
  <script src="js/grenade.js"></script>
  <!-- 战争迷雾：视线遮挡 -->
  <script src="js/vision.js"></script>
  <!-- 网络通信：WebSocket -->
  <script src="js/network.js"></script>
  <!-- 房主的游戏逻辑（模拟 + 渲染） -->
  <script src="js/hostGame.js"></script>
  <!-- 加入者的游戏逻辑（只渲染） -->
  <script src="js/clientGame.js"></script>

  <!-- ==============================
       主入口脚本：处理大厅按钮点击、连接服务器、启动游戏
       ============================== -->
  <script>
    // ---- 获取页面元素 ----
    const lobby    = document.getElementById('lobby');
    const canvas   = document.getElementById('gameCanvas');
    const statusEl = document.getElementById('status-msg');
    const btnHost  = document.getElementById('btn-host');
    const btnJoin  = document.getElementById('btn-join');
    const inputIp  = document.getElementById('input-ip');

    // ---- 全局状态 ----
    let myId = null;      // 服务器分配给我的 ID（'player1' 或 'player2'）
    let isHost = false;   // 我是否是房主
    let gameStarted = false;
    let ws = null;        // WebSocket 引用（用于在刷新时主动关闭）
    let intentionalClose = false; // 标记是否是主动关闭（避免重复处理）

    // ==== 关键修复：刷新/关闭页面时主动断开 WebSocket ====
    // 如果不在这里关闭，服务器可能要等 15-60 秒才能检测到断开，
    // 导致“残留连接”问题——下一局游戏会因为旧连接的存在而出错。
    window.addEventListener('beforeunload', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
      }
    });

    // 设置状态消息的辅助函数
    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    // ---- "创建游戏" 按钮被点击 ----
    btnHost.addEventListener('click', () => {
      isHost = true;
      intentionalClose = false;
      setStatus('正在连接服务器...');
      btnHost.disabled = true;
      btnJoin.disabled = true;

      // 连接到本机的服务器（localhost = 自己的电脑）
      ws = Network.connect('localhost', onOpen, onMessage, onClose);
    });

    // ---- "加入游戏" 按钮被点击 ----
    btnJoin.addEventListener('click', () => {
      const ip = inputIp.value.trim();
      if (!ip) {
        setStatus('请输入房主的 IP 地址！');
        return;
      }
      isHost = false;
      intentionalClose = false;
      setStatus('正在连接到 ' + ip + ' ...');
      btnHost.disabled = true;
      btnJoin.disabled = true;

      // 连接到房主电脑的服务器
      ws = Network.connect(ip, onOpen, onMessage, onClose);
    });

    // ---- WebSocket 连接成功 ----
    function onOpen() {
      setStatus('已连接！等待另一位玩家加入...');
    }

    // ---- 收到服务器/对方的消息 ----
    function onMessage(data) {
      if (data.type === 'welcome') {
        // 服务器告诉我：我是 player1 还是 player2
        myId = data.id;
        console.log('I am ' + myId);
      }

      if (data.type === 'gameStart') {
        // 两个玩家都到齐了，开始游戏！
        if (!gameStarted) {
          gameStarted = true;
          startGame();
        }
      }

      if (data.type === 'roomFull') {
        intentionalClose = true; // 服务器会立即关闭连接，不要重复处理
        // 房间已满（已有 2 个玩家在玩）
        setStatus('房间已满！请等待当前游戏结束后再试。');
        btnHost.disabled = false;
        btnJoin.disabled = false;
        return;
      }

      if (data.type === 'opponentLeft') {
        intentionalClose = true; // 标记：服务器主动断开，不要重复处理
        // 停止当前游戏循环
        if (isHost && typeof HostGame !== 'undefined') HostGame.stop();
        if (!isHost && typeof ClientGame !== 'undefined') ClientGame.stop();
        // 回到大厅，让用户可以重新开始（不需要刷新页面）
        canvas.style.display = 'none';
        lobby.style.display = 'block';
        setStatus('对手已断开连接。你可以重新创建或加入游戏。');
        btnHost.disabled = false;
        btnJoin.disabled = false;
        gameStarted = false;
        myId = null;
        return;
      }

      // 把消息传给对应的游戏模块处理
      if (gameStarted) {
        if (isHost && typeof HostGame !== 'undefined') {
          HostGame.onNetworkMessage(data);
        } else if (!isHost && typeof ClientGame !== 'undefined') {
          ClientGame.onNetworkMessage(data);
        }
      }
    }

    // ---- WebSocket 连接断开 ----
    function onClose() {
      if (intentionalClose) {
        intentionalClose = false; // 已经被 opponentLeft/roomFull 处理过了
        return;
      }
      if (!gameStarted) {
        // 还没开始游戏就断开了——可能是服务器没开，或者被拒绝了
        setStatus('连接已断开。请确认服务器正在运行，然后重试。');
        btnHost.disabled = false;
        btnJoin.disabled = false;
      }
      // 如果游戏已开始，断开连接的处理在 opponentLeft 中完成
    }

    // ---- 开始游戏 ----
    function startGame() {
      // 隐藏大厅，显示游戏画布
      lobby.style.display = 'none';
      canvas.style.display = 'block';
    
      // 让画布填满窗口
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    
      // 初始化输入系统（绑定到画布上）
      Input.init(canvas);
    
      // 预加载所有资源（图片 + 音频），加载完成后再启动游戏
      setStatus('正在加载游戏资源...');
      Assets.preloadAll(function () {
        // 根据角色启动对应的游戏循环
        if (isHost) {
          HostGame.start(canvas, myId);
        } else {
          ClientGame.start(canvas, myId);
        }
      });
    }

    // 窗口大小改变时，调整画布尺寸
    window.addEventListener('resize', () => {
      if (gameStarted) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    });
  </script>

</body>
</html>
